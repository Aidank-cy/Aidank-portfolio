name: Sync to public repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private files
        run: |
          # AI/agent instructions and private editing guidance stay in the dev repo.
          rm -rf AGENTS.md CLAUDE.md EDITING.md
          rm -rf .project-rules .harness .cursor skills hooks
          rm -f .github/copilot-instructions.md
          # Internal project tracking stays private even when version-controlled.
          rm -f CHANGELOG.md TODO.md
          # Private-only automation should not be mirrored to the public repo.
          rm -f .github/workflows/ai-quality-gate.yml
          rm -f .github/workflows/sync-public.yml

      - name: Test token
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PUBLIC_REPO_TOKEN }}" \
            https://api.github.com/repos/Aidank-cy/Aidank-portfolio