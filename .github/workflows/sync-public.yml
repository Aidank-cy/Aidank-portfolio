name: Sync to public repo

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private files
        run: |
          # AI/agent instructions and private editing guidance stay in the dev repo.
          rm -rf AGENTS.md CLAUDE.md EDITING.md
          rm -rf .project-rules .harness .cursor skills hooks
          rm -f .github/copilot-instructions.md
          # Internal project tracking stays private even when version-controlled.
          rm -f CHANGELOG.md TODO.md
          # Private-only automation should not be mirrored to the public repo.
          rm -f .github/workflows/ai-quality-gate.yml
          rm -f .github/workflows/sync-public.yml

      - name: Debug auth
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          echo "Token length: ${#TOKEN}"
          echo "Token prefix: ${TOKEN:0:4}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/Aidank-cy/Aidank-portfolio)
          echo "API response: ${STATUS}"

      - name: Push to public repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git config credential.helper store
          echo "https://Aidank-cy:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com" > ~/.git-credentials

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync, skipping."
            exit 0
          fi

          git commit -m "sync: update from dev ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git remote add public https://github.com/Aidank-cy/Aidank-portfolio.git
          git push public HEAD:main --force